name: Build, Push and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:  # Allow manual triggers

env:
  REGISTRY: ghcr.io
  # Update these to your container registry - uses GitHub username/org by default
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/esse_studio/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/esse_studio/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      # Build backend using Dockerfile.workspaces with monorepo root context
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile.workspaces
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build frontend using Dockerfile.workspaces with monorepo root context
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile.workspaces
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL || 'http://localhost:3002' }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.API_URL || 'http://localhost:3002' }}
            INTERNAL_API_URL=${{ vars.API_URL || 'http://localhost:3002' }}
            EXTERNAL_API_URL=${{ vars.API_URL || 'http://localhost:3002' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubernetes credentials
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/esse-studio-deployment.yaml

      - name: Restart deployments to pull new images
        run: |
          kubectl rollout restart deployment/esse-studio-backend
          kubectl rollout restart deployment/esse-studio-frontend

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/esse-studio-backend --timeout=300s

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/esse-studio-frontend --timeout=300s

      - name: Show deployment status
        run: |
          echo "=== Deployments ==="
          kubectl get deployments esse-studio-backend esse-studio-frontend
          echo ""
          echo "=== Pods ==="
          kubectl get pods -l app=esse-studio-backend
          kubectl get pods -l app=esse-studio-frontend
          echo ""
          echo "=== Deployment Complete ==="
