# Coturn TURN server configuration for WebRTC
# This enables NAT traversal for cellular-to-WiFi and other complex network scenarios

# Listening ports
listening-port=3478
# TLS listening port (optional, recommended for production)
tls-listening-port=5349

# Relay ports range for media
min-port=49152
max-port=65535

# Authentication
# Use long-term credentials mechanism
lt-cred-mech
# CHANGE THESE IN PRODUCTION - generate strong random credentials
user=turnuser:turnpassword

# Realm (used for authentication)
realm=verifiable-ai

# Server name
server-name=coturn

# Logging
verbose
log-file=/var/log/turnserver.log

# Security
# Deny access from private IP ranges (prevent TURN server abuse)
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Allow loopback for local testing
# Comment out in production
# allowed-peer-ip=127.0.0.1

# TLS/DTLS certificates (optional, for encrypted TURN)
# cert=/etc/coturn/turn_server_cert.pem
# pkey=/etc/coturn/turn_server_pkey.pem

# Performance tuning
# Total quota in MB
total-quota=100
# User quota in MB
user-quota=10
# Max number of bps per session
max-bps=3000000

# Mobility with ICE
mobility
# Fingerprint in TURN messages
fingerprint

# Process management
pidfile=/var/run/turnserver.pid

# Enable STUN protocol support
# TURN server also acts as STUN server (REQUIRED for NAT traversal)
# Removed 'no-stun' - STUN is essential for ICE connectivity checks

# CLI interface
cli-ip=127.0.0.1
cli-port=5766
cli-password=clipassword

# Prometheus metrics (optional)
# prometheus
# prometheus-port=9641
